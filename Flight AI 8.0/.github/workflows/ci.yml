name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Run pytest
        run: |
          pytest -q

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    needs: backend-tests
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Cache Node modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/frontend/react-app/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Install frontend deps
        working-directory: frontend/react-app
        run: |
          npm install
      - name: Build frontend
        working-directory: frontend/react-app
        run: |
          npm run build
      - name: Install backend deps for E2E
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Start backend for E2E
        run: |
          nohup python3 backend/app.py &>/tmp/backend-e2e.log &
          for i in {1..30}; do
            if curl -sSf http://127.0.0.1:5050/syllabus >/dev/null 2>&1; then
              echo "backend up"; break
            fi
            sleep 1
          done
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/react-app/dist

  e2e-tests:
    name: Frontend E2E (Playwright)
    runs-on: ubuntu-latest
    needs: frontend-build
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Cache Node & Playwright
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-node-playwright-${{ hashFiles('**/frontend/react-app/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-playwright-
      - name: Install frontend deps and Playwright
        working-directory: frontend/react-app
        run: |
          npm install
          npx playwright install --with-deps
      - name: Cache pip for E2E
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Build frontend
        working-directory: frontend/react-app
        run: |
          npm run build
      - name: Run Playwright tests
        working-directory: frontend/react-app
        env:
          CI: true
        run: |
          npx playwright test --config=playwright.config.ts

  e2e-docker:
    name: E2E (docker-compose)
    runs-on: ubuntu-latest
    needs: frontend-build
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Ensure Docker and docker-compose plugin
        run: |
          echo "Setting up Docker buildx and QEMU"
          # Use the GitHub runner's Docker and ensure buildx/qemu are available
          # Fallback to installing docker-compose plugin only if missing
          docker --version || true
          if ! command -v docker-buildx >/dev/null 2>&1; then
            echo "buildx not found, will rely on setup-buildx-action"
          fi
          if ! docker compose version >/dev/null 2>&1; then
            echo "docker compose not available; attempting to install plugin"
            sudo apt-get update
            sudo apt-get install -y docker-compose-plugin || true
          fi
          docker --version || true
          docker compose version || true
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v2
      - name: Make scripts executable
        run: |
          chmod +x ./scripts/run_e2e_compose.sh ./scripts/docker_up.sh || true
      - name: Run docker-compose E2E runner
        env:
          CI: true
          E2E_SKIP_WEBSERVER: '1'
        run: |
          ./scripts/run_e2e_compose.sh
